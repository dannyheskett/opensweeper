name: release

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - '.editorconfig'
      - 'LICENSE'
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  guard:
    uses: ./.github/workflows/attribution-guard.yml
    permissions:
      contents: write

  prepare:
    needs: guard
    name: compute next release number
    runs-on: ubuntu-22.04
    outputs:
      version: ${{ steps.next.outputs.version }}
      sha: ${{ steps.next.outputs.sha }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - id: next
        run: |
          last=$(git tag --list 'release-*' \
                   | sed -n 's/^release-\([1-9][0-9]*\)$/\1/p' \
                   | sort -n | tail -1)
          next=$(( ${last:-0} + 1 ))
          echo "version=$next" >> "$GITHUB_OUTPUT"
          echo "sha=$GITHUB_SHA" >> "$GITHUB_OUTPUT"
          echo "Next release: release-$next at $GITHUB_SHA"

  build-linux-windows:
    name: linux + windows builds
    needs: prepare
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v7
      - name: Install Linux + mingw deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libgl1-mesa-dev libx11-dev libxrandr-dev libxinerama-dev \
            libxcursor-dev libxi-dev libasound2-dev \
            mingw-w64 mingw-w64-tools binutils-mingw-w64 zip
      - name: Build raylib (Linux)
        run: ./scripts/build_raylib_linux.sh
      - name: Run unit tests
        run: make test
      - name: Build raylib (mingw win64 + win32)
        run: ./scripts/build_raylib_windows.sh
      - name: Package Linux + Windows archives
        run: make dist-linux dist-windows OPENSWEEPER_VERSION=${{ needs.prepare.outputs.version }}
      - uses: actions/upload-artifact@v4
        with:
          name: linux-windows
          path: dist/*

  build-mac:
    name: macOS universal build
    needs: prepare
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v7
      - name: Build raylib (universal arm64 + x86_64)
        run: ./scripts/build_raylib_mac.sh
      - name: Package macOS archive
        run: make dist-mac OPENSWEEPER_VERSION=${{ needs.prepare.outputs.version }}
      - uses: actions/upload-artifact@v4
        with:
          name: mac
          path: dist/*

  build-web:
    name: web (WASM) build
    needs: prepare
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v7
      - name: Set up Emscripten
        uses: mymindstorm/setup-emsdk@v16
      - name: Install zip
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends zip
      - name: Build raylib (web)
        run: ./scripts/build_raylib_web.sh
      - name: Build WASM
        run: make web
      - name: Publish the hosted build to the site (danheskett.com/dist/opensweeper)
        env:
          TOKEN: ${{ secrets.SITE_REBUILD_TOKEN }}
          VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          rm -rf site-repo
          git clone --depth 1 "https://x-access-token:${TOKEN}@github.com/dannyheskett/danheskett.git" site-repo
          dst=site-repo/static/dist/opensweeper
          mkdir -p "$dst"
          cp build/web/opensweeper.html "$dst/index.html"
          cp build/web/opensweeper.js   "$dst/opensweeper.js"
          cp build/web/opensweeper.wasm "$dst/opensweeper.wasm"
          cd site-repo
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add static/dist/opensweeper
          if git diff --cached --quiet; then
            echo "hosted WASM unchanged"
          else
            git commit -m "opensweeper: update hosted WASM to release-${VERSION}"
            git push
          fi
      - name: Package WASM bundle
        run: make dist-web OPENSWEEPER_VERSION=${{ needs.prepare.outputs.version }}
      - uses: actions/upload-artifact@v4
        with:
          name: web
          path: dist/*

  publish:
    name: tag + publish GitHub Release
    needs: [prepare, build-linux-windows, build-mac, build-web]
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist-merged
          merge-multiple: true
      - run: ls -la dist-merged/
      - name: Create release-N tag
        env:
          V: ${{ needs.prepare.outputs.version }}
          SHA: ${{ needs.prepare.outputs.sha }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag "release-$V" "$SHA"
          git push origin "release-$V"
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: release-${{ needs.prepare.outputs.version }}
          name: release-${{ needs.prepare.outputs.version }}
          target_commitish: ${{ needs.prepare.outputs.sha }}
          files: dist-merged/*
          generate_release_notes: true
          fail_on_unmatched_files: true
          draft: false
      - name: Trigger site rebuild
        env:
          TOKEN: ${{ secrets.SITE_REBUILD_TOKEN }}
        run: |
          curl -s -o /dev/null -w "%{http_code}" -X POST \
            -H "Authorization: Bearer $TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/dannyheskett/danheskett/actions/workflows/hugo.yml/dispatches \
            -d '{"ref":"main"}'
